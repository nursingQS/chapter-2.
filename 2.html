<script>
    // Chapter 2: Medical-Surgical Nursing (Community & Home Health) – 34 questions
    const questions = [
        {
            id: 1,
            question: "1. The nurse navigator is coordinating the transition from the hospital to a rehabilitation facility of a client who had a total hip replacement. Which activity would be an example of the nurse navigator role for this client?",
            options: [
                "A. Ensuring cost-effective care",
                "B. Communicating with the medical insurance company",
                "C. Educating the client on the goals of rehabilitation",
                "D. Providing direct care to the client"
            ],
            correct: 2, // C
            rationale: "Correct. The role of the nurse navigator is to assist clients with transitions in different levels of care, such as from the hospital to a rehabilitation facility. It is the role of a case manager to ensure cost-effective care and to communicate with the medical insurance company. The nurse navigator does not provide direct care to clients. (PTS:1 REF:p.35)"
        },
        {
            id: 2,
            question: "2. The nursing instructor is preparing a group of students for their home care rotation. Which of the following types of care are the students most likely to provide?",
            options: [
                "A. Primary care",
                "B. Assistance with food shopping",
                "C. Performing household chores",
                "D. Skilled nursing care"
            ],
            correct: 3, // D
            rationale: "Correct. The role of the home health nurse is to provide skilled nursing care to clients. The home health nurse does not provide primary care to the client as this is not within the scope of practice of a nurse without an advanced practice certification. The home health aide or other assistive person may help with household chores and shopping. (PTS:1 REF:p.49)"
        },
        {
            id: 3,
            question: "3. The community health nurse is preparing to conduct a home visit on a client without an active infection. When performing the home visit, how should the nurse best implement the principles of infection control?",
            options: [
                "A. Perform hand hygiene before and after giving direct client care.",
                "B. Remove the client's soiled wound dressings from the home promptly.",
                "C. Use transmission-based precautions with the client.",
                "D. Establish a sterile field in the client's home before providing care."
            ],
            correct: 0, // A
            rationale: "Correct. Infection control is as important in the home as it is in the hospital. As in any situation, nurses should clean the hands before and after giving direct client care. Removing the wound dressings from the home is not necessary as long as they are disposed of properly. Transmission-based precautions are only necessary when the client is infected with an infectious organism. A sterile field is not necessary to provide routine care. (PTS:1 REF:p.50)"
        },
        {
            id: 4,
            question: "4. An adult client with a history of diabetes is scheduled for a transmetatarsal amputation. When should the client's discharge planning begin?",
            options: [
                "A. The day prior to discharge",
                "B. The day of estimated discharge",
                "C. The day that the client is admitted",
                "D. Once the nursing care plan has been finalized"
            ],
            correct: 2, // C
            rationale: "Correct. Discharge planning begins with the client's admission to the hospital and must consider the possible need for follow-up home care. Discharge planning should begin prior to the other listed times. (PTS:1 REF:p.53)"
        },
        {
            id: 5,
            question: "5. A home health nurse is preparing to make the initial visit to a new client's home. When planning educational interventions, what information should the nurse provide to the client and family? Select all that apply.",
            options: [
                "A. Available community resources to meet their needs",
                "B. Information on other clients in the area with similar health care needs",
                "C. The nurse's contact information",
                "D. Dates and times of scheduled home care visits",
                "E. The goals of care established by the nurse"
            ],
            correct: [0, 2, 3], // A, C, D
            rationale: "Correct. The community-based nurse is responsible for informing the client and family about the community resources available to meet their needs. During initial and subsequent home visits, the nurse helps the client and family identify these community services and encourages them to contact the appropriate agencies. The nurse also provides the client with contact information so that the client and family know how to reach the nurse with questions or a problem. The nurse also provides the client with a schedule of futures visits so the client knows when to expect visits. Following HIPAA guidelines the nurse is not able to share information on other clients. The goals for care should be developed with the client and not by the nurse alone. (PTS:1 REF:p.51)"
        },
        {
            id: 6,
            question: "6. At the beginning of a day that will involve several home visits, the nurse has ensured that the health care agency has a copy of the nurse's daily schedule. What is the rationale for this action?",
            options: [
                "A. It allows the agency to keep track for billing purposes.",
                "B. It supports safety precautions for the nurse when making a home care visit.",
                "C. It allows for greater flexibility for the nurse and colleagues for changes in assignments.",
                "D. It allows the client to cancel or change appointments with minimal inconvenience."
            ],
            correct: 1, // B
            rationale: "Correct. Whenever a nurse makes a home visit, the agency should know the nurse's schedule and the locations of the visits. The other answers are incorrect because providing the agency with a copy of the daily schedule is not for the purpose of correctly handling payment or for the ease of the nurse in changing assignments. It is also not intended for the client's ease in cancelling appointments. (PTS:1 REF:p.51)"
        },
        {
            id: 7,
            question: "7. There are specific legal guidelines and regulations for the documentation related to home care. When providing care for a client who is a Medicaid recipient, what is most important for the nurse to document?",
            options: [
                "A. The medical diagnosis and the supplies needed to care for the client",
                "B. A summary of the client's income tax paid during the previous year",
                "C. The specific quality of nursing care that is needed",
                "D. The client's homebound status and the specific need for skilled nursing care"
            ],
            correct: 3, // D
            rationale: "Correct. Medicare, Medicaid, and third-party payers require documentation of the client's homebound status and the need for skilled professional nursing care. The medical diagnosis and specific detailed information on the functional limitations of the client are usually part of the documentation. The other answers are incorrect because nursing documentation does not include needed supplies, tax information, or the quality of care needed. (PTS:1 REF:p.52)"
        },
        {
            id: 8,
            question: "8. A client has had a total knee replacement and will need to walk with a two-wheeled walker for 6 weeks. The client is being discharged home with a referral for home health care. What assessment should the nurse prioritize during the initial nursing assessment in the home?",
            options: [
                "A. Assistance of family and neighbors",
                "B. Qualification for government subsidies",
                "C. Costs related to the visits",
                "D. Characteristics of the home environment"
            ],
            correct: 3, // D
            rationale: "Correct. The initial assessment includes evaluating the client, the home environment, the client's self-care abilities or the family's ability to provide care, and the client's need for additional resources. Normally an assessment is not made of assistance on the part of neighbors or the costs of the visit. Qualifications for subsidies would normally be determined beforehand. (PTS:1 REF:p.51)"
        },
        {
            id: 9,
            question: "9. A nurse who has an advanced degree in primary care for a pediatric population is employed in a health clinic. In what role is this nurse functioning?",
            options: [
                "A. Nurse practitioner",
                "B. Case coordinator",
                "C. Clinical nurse specialist",
                "D. Clinic supervisor"
            ],
            correct: 0, // A
            rationale: "Correct. Nurse practitioners, educated in primary care, often practice in ambulatory care settings that focus on gerontology, pediatrics, family or adult health, or women's health. Case coordinators and clinical supervisors do not necessarily require an advanced degree, and a clinical nurse specialist is not educated in primary care. Primary care is the specific focus of CNPs. (PTS:1 REF:p.50)"
        },
        {
            id: 10,
            question: "10. A master's degree-prepared nurse is helping other nurses on a medical–surgical unit integrate evidence and research into their practice. Which role is this nurse performing?",
            options: [
                "A. Case manager",
                "B. Clinical nurse leader",
                "C. Nurse navigator",
                "D. Critical care nurse"
            ],
            correct: 1, // B
            rationale: "Correct. A clinical nurse leader (CNL) is a certified nurse generalist with a master's degree in nursing who integrates evidence-based practices into client care. A case manager, who may not have a graduate degree or be a nurse, coordinates health care services to ensure cost-effectiveness, accountability, and quality care for a caseload of clients. A nurse navigator works with a given population of clients with a common diagnosis or disease to help the client and family transition through different levels of care. A critical care nurse is a staff nurse who works in an intensive care unit. (PTS:1 REF:p.36)"
        },
        {
            id: 11,
            question: "11. A recent nursing school graduate has chosen to pursue a community nursing position because of increasing opportunities for nurses in community settings. What change(s) in the American health care system have created an increased need for nurses to practice in community-based settings? Select all that apply.",
            options: [
                "A. Tighter insurance regulations",
                "B. Younger population",
                "C. Increased rural population",
                "D. Changes in federal legislation",
                "E. Decreasing hospital revenues"
            ],
            correct: [0, 3, 4], // A, D, E
            rationale: "Correct. Changes in federal legislation, tighter insurance regulations, decreasing hospital revenues, and alternative health care delivery systems have also affected the ways in which health care is delivered. The United States does not have an increased rural population nor is our population younger. (PTS:1 REF:p.34)"
        },
        {
            id: 12,
            question: "12. A nursing student has taught a colleague that nursing practice is not limited to hospital settings, explaining that nurses are now working in ambulatory health clinics, hospice settings, and homeless shelters and clinics. What factor has most influenced this increased diversity in practice settings for nurses?",
            options: [
                "A. Population shift to more rural areas",
                "B. Shift of health care delivery into the community",
                "C. Advent of primary care clinics",
                "D. Increased use of rehabilitation hospitals"
            ],
            correct: 1, // B
            rationale: "Correct. As health care delivery shifts into the community, more nurses are working in a variety of community-based settings. These settings include public health departments, ambulatory health clinics, long-term care facilities, hospice settings, industrial settings (as occupational nurses), homeless shelters and clinics, nursing centers, home health agencies, urgent care centers, same-day surgical centers, short-stay facilities, and clients' homes. The other answers are incorrect because our population has not shifted to a more rural base, and the use of primary care clinics has not led to an increase in practice settings or the use of rehabilitation hospitals. (PTS:1 REF:p.34)"
        },
        {
            id: 13,
            question: "13. A nurse is collaborating with a team of community nurses to identify the vision and mission for community care. What is the central focus of nursing?",
            options: [
                "A. Increased health literacy in the community",
                "B. Distributing ownership for the health of the community",
                "C. Promoting and maintaining the health of individuals and families",
                "D. Identifying links between lifestyle and health"
            ],
            correct: 2, // C
            rationale: "Correct. Community-based nursing practice focuses centrally on promoting and maintaining the health of individuals and families, preventing and minimizing the progression of disease, and improving quality of life. Health literacy is not a goal in itself, but rather a means to promoting health. Distributing ownership and identifying links between lifestyle and health are not the essence of community-based care. (PTS:1 REF:p.36)"
        },
        {
            id: 14,
            question: "14. A nurse provides community-based care and acts as the case manager for a small town about 60 miles (100 km) from a major health care center. When planning care in the community, what is the most important variable in community-based nursing that the nurse should integrate into planning?",
            options: [
                "A. Eligibility requirements for services",
                "B. Community resources available to clients",
                "C. Transportation costs to the medical center",
                "D. Possible charges for any services provided"
            ],
            correct: 1, // B
            rationale: "Correct. A community-based nurse must first be knowledgeable about community resources available to clients as well as services provided by local agencies, eligibility requirements, and any possible charges for the services. The other answers are incorrect because they are not the most important factors about which a community-based nurse must be knowledgeable, even though each must be considered. (PTS:1 REF:p.49)"
        },
        {
            id: 15,
            question: "15. The community-based care manager works in a medium-sized community that does not have an up-to-date discharge planning directory, so the nurse has been given the task of beginning to compile one. What will need to be included with the discharge plan? Select all that apply.",
            options: [
                "A. Links to online health sciences journals",
                "B. Collaboration of referring agency with community resources",
                "C. Eligibility requirements for services",
                "D. Lists of the most commonly used resources",
                "E. Discharge plan communication"
            ],
            correct: [1, 2, 3, 4], // B, C, D, E
            rationale: "Correct. A discharge planning directory should include the commonly used community resources that clients need as set in the discharge plan, including eligibility requirements for those resources, and open communication within the referral systems. The discharge plan would not include links to online professional journals (which are intended for health care providers). (PTS:1 REF:p.53)"
        },
        {
            id: 16,
            question: "16. The nurse is assessing a new client and the client's home environment following a referral for community-based care. What action should the nurse prioritize during this initial visit?",
            options: [
                "A. Help the client and family to become more involved in their community.",
                "B. Encourage the client and family to delegate someone to contact community resources.",
                "C. Educate the client and family about how to evaluate online supports.",
                "D. Encourage the client and family to connect with appropriate community resources."
            ],
            correct: 3, // D
            rationale: "Correct. During initial and subsequent home visits, the nurse helps the client and family identify community services and encourages them to contact the appropriate agencies. This is preferable to delegating another person to make contact. When appropriate, nurses may make the initial contact. A home-health nurse would not normally encourage the client to become more involved in the community as a means of promoting health. Online forms of support can be useful, but they are not the sole form of support that most clients need. (PTS:1 REF:p.53)"
        },
        {
            id: 17,

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
